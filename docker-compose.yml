services:
  app:
    image: ghcr.io/tech1onegroup/muster-roller-project:latest
    container_name: labour-attendance
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models:ro
      - ./data:/app/data
      - ./server/uploads:/app/server/uploads
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DB_SCHEMA: ${DB_SCHEMA:-muster_roller}
    restart: unless-stopped
